parameters:
  - name: artifactName
    type: string
    default: 'azurefunctions-agents-runtime'
    displayName: 'Pipeline artifact name produced by the Build stage'
  - name: libraryVersion
    type: string
    default: ''
    displayName: 'Library version to build (if set, checks out release/x.y.z branch)'
  - name: githubOrg
    type: string
    default: 'Azure'
    displayName: 'GitHub organization that owns the source repository'
  - name: githubRepo
    type: string
    default: 'azure-functions-agents-runtime'
    displayName: 'GitHub repository name'

jobs:
  - job: "Build"
    displayName: 'Build Azure Functions Agent Runtime'

    pool:
      name: 1es-pool-azfunc
      image: 1es-ubuntu-22.04
      os: linux

    templateContext:
      outputParentDirectory: $(Build.ArtifactStagingDirectory)
      outputs:
        - output: pipelineArtifact
          targetPath: $(Build.SourcesDirectory)
          artifactName: ${{ parameters.artifactName }}

    steps:
      - checkout: none
      - bash: |
          $githubUser = "$(GithubUser)"
          $githubToken = "$(GithubPat)"

          # Create GitHub credential
          git config --global user.name "AzureFunctions"
          git config --global user.email "azurefunctions@microsoft.com"

          git clone --branch "release/${{ parameters.libraryVersion }}" --single-branch \
            "https://$githubUser:$githubToken@github.com/${{ parameters.githubOrg }}/${{ parameters.githubRepo }}.git" .
        displayName: 'Checkout release/${{ parameters.libraryVersion }} branch'

      - task: UsePythonVersion@0
        inputs:
          versionSpec: "3.13"
      - bash: |
          python --version
        displayName: 'Check python version'
      - task: PipAuthenticate@1
        displayName: 'Pip Authenticate'
        inputs:
          artifactFeeds: 'internal/PythonSDK_Internal_PublicPackages'
      - bash: |
          python -m pip install -U pip
          python -m pip install build
          python -m build
        displayName: 'Build Azure Functions Agent Runtime'
