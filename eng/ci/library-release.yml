trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    include:
      - src/**
    exclude:
      - src/azure_functions_agents/__init__.py

pr: none

parameters:
  - name: libraryVersion
    type: string
    default: ''
    displayName: 'Library version to release (e.g., 0.1.0)'
  - name: projectDisplayName
    type: string
    default: 'Azure Functions Agent Runtime'
    displayName: 'Human-readable project name for stage titles and commit messages'
  - name: versionFilePath
    type: string
    default: 'src/azure_functions_agents/__init__.py'
    displayName: 'Path to version file (e.g., __init__.py or version.py)'
  - name: versionPattern
    type: string
    default: "__version__ = [\"]([0-9])+\\.([0-9])+.*[\"]"
    displayName: 'Regex pattern to match version string in version file'
  - name: versionReplacement
    type: string
    default: '__version__ = "{{VERSION}}"'
    displayName: 'Replacement pattern for version (use {{VERSION}} as placeholder)'
  - name: releaseBranchPrefix
    type: string
    default: 'v'
    displayName: 'Prefix for release branch (e.g., release or release-v2)'
  - name: tagPrefix
    type: string
    default: 'v'
    displayName: 'Optional prefix for git tags (e.g., runtimes/v2-)'
  - name: createPullRequest
    type: boolean
    default: false
    displayName: 'Create a draft PR to base branch after creating release branch'
  - name: baseBranch
    type: string
    default: 'main'
    displayName: 'Base branch for PR creation (e.g., main or dev)'
  - name: blobPath
    type: string
    default: 'azure-functions/python/azurefunctions-agents-runtime'
    displayName: 'Blob path prefix under drops container'
  - name: githubOrg
    type: string
    default: 'Azure'
    displayName: 'GitHub organization that owns the source repository'
  - name: githubRepo
    type: string
    default: 'azure-functions-agents-runtime'
    displayName: 'GitHub repository name (used in URLs and as the local clone folder)'
  - name: artifactName
    type: string
    default: 'azurefunctions-agents-runtime'
    displayName: 'Pipeline artifact name produced by the Build stage'
  - name: partnerReleasePipelineUrl
    type: string
    default: 'https://dev.azure.com/azure-sdk/internal/_build?definitionId=6991'
    displayName: 'Azure SDK partner-release pipeline URL (used in manual PyPI publish instructions)'

resources:
  repositories:
    - repository: 1es
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1es
  parameters:
    pool:
      name: 1es-pool-azfunc
      image: 1es-windows-2022
      os: windows

    stages:
      - stage: ResolveVersion
        displayName: 'Resolve Library Version'
        jobs:
          - job: ResolveVersionJob
            displayName: 'Compute next beta version'
            pool:
              name: 1es-pool-azfunc
              image: 1es-windows-2022
              os: windows
            steps:
              - powershell: |
                  $providedVersion = "${{ parameters.libraryVersion }}".Trim()
                  if (-not [string]::IsNullOrWhiteSpace($providedVersion)) {
                    Write-Host "Using provided libraryVersion: $providedVersion"
                    Write-Host "##vso[task.setvariable variable=resolvedLibraryVersion;isOutput=true]$providedVersion"
                    exit 0
                  }

                  $versionFilePath = "${{ parameters.versionFilePath }}"
                  if (-not (Test-Path -LiteralPath $versionFilePath)) {
                    Write-Host "Version file not found: $versionFilePath"
                    exit 1
                  }

                  $content = Get-Content -LiteralPath $versionFilePath -Raw
                  $match = [regex]::Match($content, '__version__\s*=\s*"(?<version>[^"]+)"')
                  if (-not $match.Success) {
                    $match = [regex]::Match($content, "__version__\s*=\s*'(?<version>[^']+)'")
                  }
                  if (-not $match.Success) {
                    Write-Host "Unable to read __version__ from $versionFilePath"
                    exit 1
                  }

                  $currentVersion = $match.Groups['version'].Value
                  $nextVersion = $null

                  $betaMatch = [regex]::Match($currentVersion, "^(?<base>\d+\.\d+\.\d+)b(?<beta>\d+)$")
                  if ($betaMatch.Success) {
                    $baseVersion = $betaMatch.Groups['base'].Value
                    $nextBeta = [int]$betaMatch.Groups['beta'].Value + 1
                    $nextVersion = "$baseVersion" + "b$nextBeta"
                  }
                  elseif ($currentVersion -match '^\d+\.\d+\.\d+$') {
                    $nextVersion = "$currentVersion" + "b1"
                  }
                  else {
                    Write-Host "Unsupported version format '$currentVersion'. Expected x.y.z or x.y.zbN"
                    exit 1
                  }

                  Write-Host "Resolved libraryVersion: $nextVersion (from $currentVersion)"
                  Write-Host "##vso[task.setvariable variable=resolvedLibraryVersion;isOutput=true]$nextVersion"
                displayName: 'Resolve libraryVersion value'
                name: setVersion

      - stage: BumpVersion
        displayName: 'Bump Version'
        dependsOn: ResolveVersion
        variables:
          resolvedLibraryVersion: $[ stageDependencies.ResolveVersion.ResolveVersionJob.outputs['setVersion.resolvedLibraryVersion'] ]
        jobs:
          - template: /eng/templates/official/jobs/bump-version.yml@self
            parameters:
              libraryVersion: $(resolvedLibraryVersion)
              projectDisplayName: ${{ parameters.projectDisplayName }}
              versionFilePath: ${{ parameters.versionFilePath }}
              versionPattern: ${{ parameters.versionPattern }}
              versionReplacement: ${{ parameters.versionReplacement }}
              releaseBranchPrefix: ${{ parameters.releaseBranchPrefix }}
              createPullRequest: ${{ parameters.createPullRequest }}
              baseBranch: ${{ parameters.baseBranch }}
              githubOrg: ${{ parameters.githubOrg }}
              githubRepo: ${{ parameters.githubRepo }}

      - stage: Build
        displayName: 'Build ${{ parameters.projectDisplayName }}'
        dependsOn:
          - BumpVersion
          - ResolveVersion
        variables:
          resolvedLibraryVersion: $[ stageDependencies.ResolveVersion.ResolveVersionJob.outputs['setVersion.resolvedLibraryVersion'] ]
        jobs:
          - template: /eng/templates/official/jobs/build-artifacts.yml@self
            parameters:
              artifactName: ${{ parameters.artifactName }}
              projectDisplayName: ${{ parameters.projectDisplayName }}
              libraryVersion: $(resolvedLibraryVersion)
              releaseBranchPrefix: ${{ parameters.releaseBranchPrefix }}
              githubOrg: ${{ parameters.githubOrg }}
              githubRepo: ${{ parameters.githubRepo }}

      - stage: Release
        displayName: 'Release ${{ parameters.projectDisplayName }}'
        dependsOn:
          - Build
          - ResolveVersion
        variables:
          resolvedLibraryVersion: $[ stageDependencies.ResolveVersion.ResolveVersionJob.outputs['setVersion.resolvedLibraryVersion'] ]
        jobs:
          - template: /eng/templates/official/jobs/publish-release.yml@self
            parameters:
              libraryVersion: $(resolvedLibraryVersion)
              projectDisplayName: ${{ parameters.projectDisplayName }}
              releaseBranchPrefix: ${{ parameters.releaseBranchPrefix }}
              tagPrefix: ${{ parameters.tagPrefix }}
              blobPath: ${{ parameters.blobPath }}
              githubOrg: ${{ parameters.githubOrg }}
              githubRepo: ${{ parameters.githubRepo }}
              artifactName: ${{ parameters.artifactName }}
              partnerReleasePipelineUrl: ${{ parameters.partnerReleasePipelineUrl }}
