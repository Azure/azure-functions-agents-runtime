agent_configuration:
  provider: openai
  timeout: 1200
  openai:
    model: $OPENAI_MODEL

system_tools:
  execute_in_sessions:
    session_pool_management_endpoint: $ACA_SESSION_POOL_ENDPOINT
  tools_from_connections:
    - connection_id: $GITHUB_CONNECTION_ID
      prefix: github
    - connection_id: $SERVICENOW_CONNECTION_ID
