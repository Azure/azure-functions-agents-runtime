<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serverless Agent Portal — Agents</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo"><span class="mark">⚡</span> Serverless Agent Portal</div>
    <div class="spacer"></div>
    <span class="env" id="env-badge">loading…</span>
    <div class="user">SN</div>
  </header>

  <nav class="nav">
    <div class="group-label">Build</div>
    <a class="item active" href="agents.html"><span class="ico">🤖</span> Agents</a>
    <a class="item" href="create-agent.html"><span class="ico">＋</span> Create agent</a>
  </nav>

  <main class="main">
    <div class="breadcrumb">Home / Agents</div>
    <div class="page-title"><h1>Agents</h1></div>
    <p class="page-sub">Agent files persisted in the Function App storage account (working copy).</p>

    <div class="toolbar">
      <a class="btn primary" href="create-agent.html">＋ Create agent</a>
      <button class="btn" id="refresh">⟳ Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Trigger</th><th>Endpoints</th><th>Last modified</th><th></th></tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="5" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="app.js"></script>
<script>
  async function load() {
    const rows = document.getElementById('rows');
    rows.innerHTML = '<tr><td colspan="5" class="empty">Loading…</td></tr>';
    try {
      const agents = await api.list();
      if (!agents.length) {
        rows.innerHTML = '<tr><td colspan="5" class="empty">No agents yet. <a href="create-agent.html">Create your first agent →</a></td></tr>';
        return;
      }
      rows.innerHTML = agents.map(a => `
        <tr>
          <td><div class="cell-title">${escapeHtml(a.name)}</div><div class="cell-sub">${escapeHtml(a.description || a.displayName)}</div></td>
          <td><span class="badge blue">${escapeHtml(a.trigger || 'http')}</span></td>
          <td>${a.builtinEndpoints ? '<span class="badge gray">chat UI · API · MCP</span>' : '<span class="muted">—</span>'}</td>
          <td class="muted">${a.lastModified ? new Date(a.lastModified).toLocaleString() : '—'}</td>
          <td><a href="edit-agent.html?name=${encodeURIComponent(a.name)}">Edit →</a></td>
        </tr>`).join('');
    } catch (e) {
      rows.innerHTML = `<tr><td colspan="5" class="empty">Failed to load: ${escapeHtml(e.message)}</td></tr>`;
    }
  }
  document.getElementById('refresh').addEventListener('click', load);
  showBackend();
  load();
</script>
</body>
</html>
