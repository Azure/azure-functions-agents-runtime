<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Agent Chat</title>
	<style>
		:root {
			--bg: #f5f7fb;
			--panel: #ffffff;
			--border: #d8dce8;
			--text: #111827;
			--muted: #6b7280;
			--you: #2563eb;
			--assistant: #e8eefc;
			--danger: #b91c1c;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			color: var(--text);
			background: var(--bg);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			padding: 16px;
		}

		.app {
			width: min(900px, 100%);
			height: calc(100vh - 32px);
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 14px;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.topbar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 10px 14px;
			border-bottom: 1px solid var(--border);
			background: #fff;
		}

		.topbar-title {
			font-size: 14px;
			font-weight: 600;
		}

		.topbar-actions {
			display: flex;
			gap: 8px;
		}

		button {
			border: 1px solid var(--border);
			background: white;
			color: var(--text);
			border-radius: 8px;
			padding: 8px 10px;
			cursor: pointer;
			font-size: 13px;
		}

		button:hover { background: #f9fafb; }
		button:disabled { opacity: 0.6; cursor: not-allowed; }

		.gear-btn {
			width: 36px;
			height: 36px;
			display: grid;
			place-items: center;
			padding: 0;
			font-size: 16px;
		}

		.chat {
			flex: 1;
			overflow: auto;
			padding: 14px;
			display: flex;
			flex-direction: column;
			gap: 10px;
			background: linear-gradient(180deg, #ffffff, #f8faff 70%);
		}

		.bubble-wrap {
			display: flex;
			width: 100%;
		}

		.bubble-wrap.you { justify-content: flex-end; }
		.bubble-wrap.assistant { justify-content: flex-start; }

		.bubble {
			max-width: min(75ch, 85%);
			padding: 10px 12px;
			border-radius: 12px;
			line-height: 1.4;
			font-size: 14px;
			white-space: pre-wrap;
			word-break: break-word;
			border: 1px solid var(--border);
			box-shadow: 0 1px 1px rgba(15, 23, 42, 0.03);
		}

		.bubble p {
			margin: 0;
		}

		.bubble p + p,
		.bubble p + ul,
		.bubble p + ol,
		.bubble ul + p,
		.bubble ol + p,
		.bubble ul + ul,
		.bubble ol + ol,
		.bubble pre + p,
		.bubble p + pre,
		.bubble pre + ul,
		.bubble pre + ol {
			margin-top: 8px;
		}

		.bubble ul,
		.bubble ol {
			margin: 0;
			padding-left: 22px;
		}

		.bubble li + li {
			margin-top: 4px;
		}

		.bubble-intermediates {
			display: none;
			margin-top: 8px;
			padding-top: 8px;
			border-top: 1px dashed var(--border);
			font-size: 12px;
			color: var(--muted);
		}

		.bubble-intermediates.open {
			display: block;
		}

		.bubble-intermediates-title {
			font-weight: 600;
			margin-bottom: 4px;
		}

		.bubble-intermediates-text {
			white-space: pre-wrap;
			word-break: break-word;
		}

		.bubble a {
			color: inherit;
			text-decoration: underline;
		}

		.bubble .md-inline-code {
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
			font-size: 0.92em;
			padding: 1px 5px;
			border-radius: 6px;
			background: rgba(15, 23, 42, 0.1);
		}

		.bubble .md-pre {
			margin: 0;
			padding: 9px 10px;
			border-radius: 10px;
			border: 1px solid var(--border);
			background: #f8fafc;
			overflow-x: auto;
		}

		.bubble .md-pre code {
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
			font-size: 12px;
			line-height: 1.45;
		}

		.bubble .md-table-wrap {
			overflow-x: auto;
		}

		.bubble .md-table {
			width: 100%;
			border-collapse: collapse;
			font-size: 13px;
		}

		.bubble .md-table th,
		.bubble .md-table td {
			border: 1px solid var(--border);
			padding: 6px 8px;
			text-align: left;
			vertical-align: top;
		}

		.bubble .md-table thead th {
			background: #f8fafc;
			font-weight: 600;
		}

		.bubble.you {
			background: var(--you);
			color: #fff;
			border-color: #1d4ed8;
			border-bottom-right-radius: 4px;
		}

		.bubble.assistant {
			background: var(--assistant);
			border-bottom-left-radius: 4px;
		}

		.bubble.assistant.has-details {
			cursor: pointer;
		}

		.bubble.assistant.has-details:hover {
			background: #dce7ff;
		}

		/* Auto-notification bubble (chat-client-injected workflow completion).
		 * Deliberately subtler than the user/copilot bubbles: this is an
		 * out-of-band, system-injected turn, not part of the user's typed
		 * conversation, so it should fade into the page rather than compete
		 * with surrounding chat content. */
		.bubble-wrap.auto { justify-content: center; }
		.bubble.auto {
			max-width: 70%;
			padding: 4px 10px;
			border-radius: 8px;
			background: #faf8ff;
			border: 1px solid #ebe5f7;
			color: #6b5e8a;
			font-size: 12px;
			line-height: 1.35;
			box-shadow: none;
			/* Override base .bubble's `pre-wrap`: this bubble's children are
			 * structured (span + inline <details>), so we don't want the
			 * template literal's indentation rendering as visible whitespace. */
			white-space: normal;
		}
		.auto-notification-body {
			color: inherit;
		}
		.auto-notification-body code {
			font-size: 11px;
			padding: 1px 4px;
			background: #f1ecf9;
			border-radius: 3px;
			color: #5a4d80;
		}
		.auto-notification-raw {
			display: inline;
			font-size: 11px;
		}
		.auto-notification-raw summary {
			display: inline;
			cursor: pointer;
			color: #8674b0;
			user-select: none;
			margin-left: 6px;
		}
		.auto-notification-raw summary::-webkit-details-marker { display: none; }
		.auto-notification-raw summary::marker { content: ""; }
		.auto-notification-raw summary::before {
			content: "▸ ";
			font-size: 9px;
			vertical-align: 1px;
		}
		.auto-notification-raw[open] summary::before {
			content: "▾ ";
		}
		.auto-notification-raw pre {
			display: block;
			margin: 4px 0 0;
			padding: 6px 8px;
			background: #f3eefa;
			border-radius: 4px;
			white-space: pre-wrap;
			word-break: break-word;
			color: #4c3d6e;
			font-size: 11px;
		}

		.workflow-card {
			max-width: 85%;
			padding: 10px 12px;
			border-radius: 12px;
			border-bottom-left-radius: 4px;
			background: #f3f5fb;
			border: 1px solid var(--border);
			font-size: 13px;
			line-height: 1.45;
			color: var(--text);
		}

		.workflow-card.terminal-Completed { background: #e8f5ec; border-color: #b7dcc2; }
		.workflow-card.terminal-Failed { background: #fbe9e9; border-color: #e7b2b2; }
		.workflow-card.terminal-Terminated,
		.workflow-card.terminal-Canceled { background: #f1eee4; border-color: #ddd4b6; }

		.workflow-card-header {
			display: flex;
			align-items: center;
			gap: 8px;
			font-weight: 600;
			margin-bottom: 4px;
		}

		.workflow-card-chip {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 2px 8px;
			border-radius: 999px;
			font-size: 11px;
			font-weight: 600;
			background: #dbe4f6;
			color: #1e3a8a;
		}

		.workflow-card.terminal-Completed .workflow-card-chip { background: #c6e7d1; color: #14532d; }
		.workflow-card.terminal-Failed .workflow-card-chip { background: #f3c6c6; color: #7f1d1d; }
		.workflow-card.terminal-Terminated .workflow-card-chip,
		.workflow-card.terminal-Canceled .workflow-card-chip { background: #e3dabb; color: #5b4a1a; }

		.workflow-card-spinner {
			width: 10px;
			height: 10px;
			border: 2px solid currentColor;
			border-right-color: transparent;
			border-radius: 50%;
			animation: wf-spin 0.9s linear infinite;
		}

		@keyframes wf-spin { to { transform: rotate(360deg); } }

		.workflow-card-id {
			font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
			font-size: 11px;
			color: var(--muted);
			font-weight: 400;
		}

		.workflow-card-custom-status {
			color: var(--muted);
			margin-bottom: 4px;
		}

		.workflow-card-output {
			margin: 6px 0 0 0;
			padding: 8px;
			background: #fff;
			border: 1px solid var(--border);
			border-radius: 8px;
			font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
			font-size: 11px;
			white-space: pre-wrap;
			overflow-x: auto;
			max-height: 240px;
		}

		.workflow-card-tasks {
			list-style: none;
			margin: 6px 0 0 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.workflow-card-tasks li {
			display: flex;
			align-items: baseline;
			gap: 8px;
			padding: 4px 8px;
			background: #fff;
			border: 1px solid var(--border);
			border-radius: 6px;
			font-size: 12px;
		}

		.workflow-task-id {
			font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
			font-size: 11px;
			font-weight: 600;
			color: #1e3a8a;
			flex: 0 0 auto;
		}

		.workflow-task-result {
			color: var(--text);
			font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
			font-size: 11px;
			overflow-wrap: anywhere;
		}

		.meta {
			margin-top: 4px;
			font-size: 11px;
			color: var(--muted);
		}

		.bubble.you .meta {
			color: rgba(255, 255, 255, 0.92);
		}

		.composer {
			border-top: 1px solid var(--border);
			background: #fff;
			padding: 10px;
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
		}

		textarea {
			width: 100%;
			min-height: 42px;
			max-height: 160px;
			resize: vertical;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 10px;
			font-size: 14px;
			font-family: inherit;
			outline: none;
		}

		textarea:focus { border-color: #93c5fd; }

		.send-btn {
			min-width: 88px;
			background: #111827;
			color: white;
			border-color: #111827;
		}

		.send-btn:hover { background: #1f2937; }

		.status {
			padding: 0 12px 10px 12px;
			font-size: 12px;
			color: var(--muted);
			min-height: 20px;
		}

		.status.error { color: var(--danger); }

		.typing {
			display: inline-flex;
			gap: 4px;
			align-items: center;
		}

		.typing-dot {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: #64748b;
			animation: pulse 1.2s infinite;
		}

		.typing-dot:nth-child(2) { animation-delay: 0.2s; }
		.typing-dot:nth-child(3) { animation-delay: 0.4s; }

		@keyframes pulse {
			0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
			40% { transform: translateY(-2px); opacity: 1; }
		}

		.settings-backdrop {
			position: fixed;
			inset: 0;
			background: rgba(17, 24, 39, 0.45);
			display: none;
			align-items: center;
			justify-content: center;
			padding: 16px;
			z-index: 10;
		}

		.settings-backdrop.open { display: flex; }

		.settings-modal {
			width: min(500px, 100%);
			background: #fff;
			border-radius: 14px;
			border: 1px solid var(--border);
			padding: 14px;
		}

		.settings-modal h2 {
			margin: 0 0 8px;
			font-size: 16px;
		}

		.settings-help {
			margin: 0 0 12px;
			font-size: 12px;
			color: var(--muted);
		}

		.field {
			display: grid;
			gap: 6px;
			margin-bottom: 10px;
		}

		label { font-size: 12px; color: var(--muted); }

		input {
			width: 100%;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 9px 10px;
			font-size: 14px;
			outline: none;
		}

		input:focus { border-color: #93c5fd; }

		.settings-actions {
			display: flex;
			justify-content: flex-end;
			gap: 8px;
			margin-top: 4px;
		}

		.details-backdrop {
			position: fixed;
			inset: 0;
			background: rgba(17, 24, 39, 0.45);
			display: none;
			align-items: center;
			justify-content: center;
			padding: 16px;
			z-index: 11;
		}

		.details-backdrop.open { display: flex; }

		.details-modal {
			width: min(900px, 100%);
			max-height: 85vh;
			background: #fff;
			border-radius: 14px;
			border: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.details-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 12px 14px;
			border-bottom: 1px solid var(--border);
		}

		.details-title {
			margin: 0;
			font-size: 15px;
		}

		.details-content {
			overflow: auto;
			padding: 12px 14px;
			display: grid;
			gap: 14px;
		}

		.details-section h3 {
			margin: 0 0 8px;
			font-size: 14px;
		}

		.details-item {
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 9px 10px;
			background: #f8fafc;
			font-size: 13px;
			line-height: 1.45;
			white-space: pre-wrap;
			word-break: break-word;
		}

		.details-item + .details-item { margin-top: 8px; }

		.details-item-title {
			font-size: 12px;
			color: var(--muted);
			margin-bottom: 6px;
		}

		.details-pre {
			margin: 0;
			font-size: 12px;
			line-height: 1.35;
			white-space: pre-wrap;
			word-break: break-word;
		}

		.details-empty {
			font-size: 12px;
			color: var(--muted);
		}
	</style>
</head>
<body>
	<main class="app">
		<header class="topbar">
			<div class="topbar-title">Agent Chat</div>
			<div class="topbar-actions">
				<button id="newSessionBtn" type="button">New session</button>
				<button id="settingsBtn" class="gear-btn" type="button" aria-label="Settings">⚙️</button>
			</div>
		</header>

		<section id="chat" class="chat" aria-live="polite"></section>

		<form id="composer" class="composer">
			<textarea id="promptInput" placeholder="Type your message..." required></textarea>
			<button id="sendBtn" class="send-btn" type="submit">Send</button>
		</form>

		<div id="status" class="status"></div>
	</main>

	<div id="settingsBackdrop" class="settings-backdrop" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
		<section class="settings-modal">
			<h2 id="settingsTitle">Connection settings</h2>
			<p class="settings-help">These are saved locally in your browser and can be edited any time from the gear icon.</p>
			<div class="field">
				<label for="baseUrlInput">Base URL</label>
				<input id="baseUrlInput" type="url" placeholder="https://your-function-app.azurewebsites.net" />
			</div>
			<div class="field">
				<label for="keyInput">Function key</label>
				<input id="keyInput" type="password" placeholder="Enter your key (optional on localhost)" />
			</div>
			<div class="settings-actions">
				<button id="cancelSettingsBtn" type="button">Cancel</button>
				<button id="saveSettingsBtn" type="button">Save</button>
			</div>
		</section>
	</div>

	<div id="detailsBackdrop" class="details-backdrop" role="dialog" aria-modal="true" aria-labelledby="detailsTitle">
		<section class="details-modal">
			<header class="details-header">
				<h2 id="detailsTitle" class="details-title">Agent details</h2>
				<button id="closeDetailsBtn" type="button">Close</button>
			</header>
			<div id="detailsContent" class="details-content"></div>
		</section>
	</div>

	<script>
		const STORAGE_KEYS = {
			baseUrl: "chat.baseUrl",
			key: "chat.key",
			sessionId: "chat.sessionId"
		};

		const chatEl = document.getElementById("chat");
		const composerEl = document.getElementById("composer");
		const promptInputEl = document.getElementById("promptInput");
		const sendBtnEl = document.getElementById("sendBtn");
		const statusEl = document.getElementById("status");
		const newSessionBtnEl = document.getElementById("newSessionBtn");
		const settingsBtnEl = document.getElementById("settingsBtn");

		const settingsBackdropEl = document.getElementById("settingsBackdrop");
		const baseUrlInputEl = document.getElementById("baseUrlInput");
		const keyInputEl = document.getElementById("keyInput");
		const saveSettingsBtnEl = document.getElementById("saveSettingsBtn");
		const cancelSettingsBtnEl = document.getElementById("cancelSettingsBtn");
		const detailsBackdropEl = document.getElementById("detailsBackdrop");
		const detailsContentEl = document.getElementById("detailsContent");
		const closeDetailsBtnEl = document.getElementById("closeDetailsBtn");
		let currentDetailsSource = null;

		const defaultBaseUrl = `${location.protocol}//${location.host}`;

		function getApiBasePath() {
			// Examples:
			// / -> /agents/main
			// /agents/foo/ -> /agents/foo
			// /api/ -> /api/agents/main
			// /api/agents/foo/ -> /api/agents/foo
			// /api/agents/foo -> /api/agents/foo
			// Match the trailing /agents/{slug} segment while preserving any path prefix
			// (Azure Functions default 'api' prefix, reverse-proxy prefixes, etc.).
			const match = window.location.pathname.match(/^(.*)\/agents\/([^/]+)\/?$/);
			if (match) {
				return `${match[1]}/agents/${match[2]}`;
			}

			if (window.location.pathname === "/") {
				return "/agents/main";
			}

			return window.location.pathname.endsWith("/")
				? `${window.location.pathname}agents/main`
				: `${window.location.pathname}/agents/main`;
		}

		const state = {
			baseUrl: "",
			key: "",
			sessionId: null,
			loading: false,
			loadingTimer: null,
			loadingSeconds: 0
		};

		const TERMINAL_WORKFLOW_STATES = new Set(["Completed", "Failed", "Canceled", "Terminated"]);
		const WORKFLOW_POLL_INTERVAL_MS = 3000;
		const WORKFLOW_POLL_FAILURE_WARN_AT = 3;
		const workflowCards = new Map();
		let workflowPollTimer = null;
		let workflowPollInFlight = false;
		let workflowProbeInFlight = false;
		let workflowPollFailureCount = 0;
		// "unknown" until probed; once "unsupported" we never poll, persist, or
		// claim reconnect for this base URL. Set by either the explicit probe
		// at boot or the first 404/501 from the polling endpoint.
		let workflowsCapability = "unknown";
		// Bumped every time the user changes base URL via Settings. Each
		// in-flight fetch captures the current epoch and discards its
		// response if the epoch has moved on, so a slow probe/poll for app
		// A can't mutate state belonging to app B.
		let workflowEpoch = 0;

		// --- Workflow auto-notification (terminal-state -> synthetic
		// `<workflow-notification>` user message into the chat). The
		// queue carries enough identity for drain-time checks to drop
		// items belonging to a session/app the user has since moved away
		// from. The drain is single-flight and waits for `state.loading`
		// to fall to false so it never races the user's own turn or a
		// previous auto-notification still streaming.
		const pendingCompletionQueue = [];   // Array<{epoch, baseUrl, sessionId, workflowId, status}>
		let completionDrainInFlight = false;
		// Restored sessionStorage value held separately from state.sessionId
		// so it doesn't ride along on chat requests for non-workflow apps
		// (where the probe will eventually return 404 and we drop it). Only
		// promoted into state.sessionId after the probe confirms support.
		let restoredSessionIdCandidate = null;
		// Tracks whether the current state.sessionId came from a fresh
		// chatstream `session` event vs. being restored from sessionStorage.
		// The "Reconnected" greeting / persistence guards branch on this.
		let sessionWasFromServer = false;
		let restoredGreetingContent = null;

		function buildAuthQuery() {
			return state.key ? `?code=${encodeURIComponent(state.key)}` : "";
		}

		function workflowsAreSupported() {
			return workflowsCapability === "supported";
		}

		function markWorkflowsUnsupported() {
			if (workflowsCapability === "unsupported") return;
			workflowsCapability = "unsupported";
			stopWorkflowPolling();
			restoredSessionIdCandidate = null;
			// Drop any speculatively-restored session id from storage so we
			// don't claim reconnect on the next reload of an app that has
			// no workflow endpoint.
			try { sessionStorage.removeItem(sessionStorageKeyForSessionId()); } catch (_e) {}
		}

		function markWorkflowsSupported() {
			if (workflowsCapability === "supported") return;
			workflowsCapability = "supported";
			// Promote the restored candidate (if any) only now that we
			// know it's safe to attribute to this app.
			if (!state.sessionId && restoredSessionIdCandidate) {
				state.sessionId = restoredSessionIdCandidate;
				sessionWasFromServer = false;
			}
			restoredSessionIdCandidate = null;
			persistSessionId();
			startWorkflowPolling();
		}

		// Hash the base URL into the storage key so multiple deployments
		// served from the same browser don't collide on `chat.sessionId`.
		// Cheap non-cryptographic hash is fine — this is just a namespace.
		function hashString(str) {
			let h = 0;
			for (let i = 0; i < str.length; i++) {
				h = ((h << 5) - h + str.charCodeAt(i)) | 0;
			}
			return (h >>> 0).toString(36);
		}

		function sessionStorageKeyForSessionId() {
			const ns = state.baseUrl ? hashString(state.baseUrl) : "default";
			return `${STORAGE_KEYS.sessionId}.${ns}`;
		}

		function loadRestoredSessionCandidate() {
			// Called after BOTH loadSettings() and loadSettingsFromHash()
			// have finalized state.baseUrl, so the namespace key matches
			// the app we're actually about to talk to.
			try {
				const stored = (sessionStorage.getItem(sessionStorageKeyForSessionId()) || "").trim();
				restoredSessionIdCandidate = stored || null;
			} catch (_e) {
				restoredSessionIdCandidate = null;
			}
		}

		// Per-{baseUrl, sessionId} record of workflow ids we've already
		// notified the agent about. Persisted in sessionStorage so a page
		// refresh after a workflow completed (and the agent already
		// summarized) does not re-fire the synthetic notification turn.
		// `notifiedWorkflowsStorageKey()` returns null until both
		// state.baseUrl and state.sessionId are set; callers tolerate that
		// (no-op load returns empty, no-op persist drops the write).
		function notifiedWorkflowsStorageKey() {
			if (!state.baseUrl || !state.sessionId) return null;
			return `chat.notifiedWorkflows.${hashString(state.baseUrl)}.${state.sessionId}`;
		}

		function loadNotifiedWorkflowIds() {
			const key = notifiedWorkflowsStorageKey();
			if (!key) return new Set();
			try {
				const raw = sessionStorage.getItem(key);
				if (!raw) return new Set();
				const arr = JSON.parse(raw);
				return new Set(Array.isArray(arr) ? arr : []);
			} catch (_e) {
				return new Set();
			}
		}

		function persistNotifiedWorkflowId(workflowId) {
			const key = notifiedWorkflowsStorageKey();
			if (!key) return;
			try {
				const set = loadNotifiedWorkflowIds();
				set.add(workflowId);
				// Cap to bound storage growth across long-lived sessions.
				const arr = Array.from(set).slice(-200);
				sessionStorage.setItem(key, JSON.stringify(arr));
			} catch (_e) { /* quota exceeded — non-fatal */ }
		}

		function truncateId(id) {
			if (!id) return "";
			return id.length > 14 ? `${id.slice(0, 6)}…${id.slice(-4)}` : id;
		}

		function renderTaskResults(results) {
			if (!results || typeof results !== "object") return "";
			const entries = Object.entries(results);
			if (!entries.length) return "";
			const rows = entries.map(([taskId, result]) => {
				const summary = typeof result === "string"
					? result
					: JSON.stringify(result);
				const truncated = summary.length > 120 ? `${summary.slice(0, 117)}…` : summary;
				return `<li><span class="workflow-task-id">${escapeHtml(taskId)}</span> <span class="workflow-task-result">${escapeHtml(truncated)}</span></li>`;
			}).join("");
			return `<ul class="workflow-card-tasks">${rows}</ul>`;
		}

		function renderWorkflowCard(entry, envelope) {
			const status = String(envelope.runtime_status || "Pending");
			const terminal = TERMINAL_WORKFLOW_STATES.has(status);
			const card = entry.card;

			// Whitelist class suffixes so a stray runtime_status from a
			// future Durable version can't poison our class name.
			const knownStatuses = new Set([
				"Pending", "Running", "Completed", "Failed",
				"Canceled", "Terminated", "ContinuedAsNew", "Suspended"
			]);
			const statusClass = knownStatuses.has(status) ? status : "Unknown";
			card.className = `workflow-card terminal-${statusClass}`;

			const custom = String(envelope.custom_status ?? "");
			const taskResults = envelope.output && typeof envelope.output === "object"
				? envelope.output.results
				: null;
			const tasksHtml = renderTaskResults(taskResults);
			const rawOutputText = !tasksHtml && envelope.output !== undefined && envelope.output !== null
				? JSON.stringify(envelope.output, null, 2)
				: "";

			const chipIcon = terminal
				? (status === "Completed" ? "✓" : status === "Failed" ? "✕" : "⏹")
				: '<span class="workflow-card-spinner" aria-hidden="true"></span>';

			card.innerHTML = `
				<div class="workflow-card-header">
					<span class="workflow-card-chip">${chipIcon} ${escapeHtml(status)}</span>
					<span>Workflow</span>
					<span class="workflow-card-id">${escapeHtml(truncateId(envelope.workflow_id))}</span>
				</div>
				${custom ? `<div class="workflow-card-custom-status">${escapeHtml(custom)}</div>` : ""}
				${tasksHtml}
				${rawOutputText ? `<pre class="workflow-card-output">${escapeHtml(rawOutputText)}</pre>` : ""}
			`;

			entry.status = status;
			entry.terminal = terminal;
		}

		function upsertWorkflowCard(envelope) {
			const wid = envelope.workflow_id;
			if (!wid) return;
			let entry = workflowCards.get(wid);
			if (!entry) {
				const wrap = document.createElement("div");
				wrap.className = "bubble-wrap copilot";
				const card = document.createElement("div");
				card.className = "workflow-card";
				card.setAttribute("role", "status");
				card.setAttribute("aria-live", "polite");
				wrap.appendChild(card);
				chatEl.appendChild(wrap);
				entry = { wrap, card, status: null, terminal: false, lastUpdated: null, notifyState: "unseen" };
				workflowCards.set(wid, entry);
				// If this workflow is in our persisted notified-set
				// (e.g. user refreshed after the summary turn already
				// landed), pre-mark as 'sent' so we don't re-fire the
				// notification. A fast workflow that started+finished
				// within one 3s poll will NOT be in the set yet, so it
				// still gets a notification — that's the case we care
				// about.
				if (loadNotifiedWorkflowIds().has(wid)) {
					entry.notifyState = "sent";
				}
			}
			const status = String(envelope.runtime_status || "Pending");
			const terminal = TERMINAL_WORKFLOW_STATES.has(status);
			// Idempotent render: skip when nothing visibly changed AND
			// we've already settled the notify state for this entry.
			if (
				entry.terminal &&
				entry.lastUpdated === envelope.last_updated_time &&
				entry.notifyState !== "unseen"
			) {
				return;
			}
			entry.lastUpdated = envelope.last_updated_time;
			renderWorkflowCard(entry, envelope);

			// Auto-notification: enqueue once per workflow, the first time
			// we see it in a terminal state. The persisted notified-set
			// (above) guards against re-firing on page refresh; the
			// `unseen` -> `queued` transition guards against re-enqueueing
			// across multiple poll cycles within a single page lifetime.
			if (terminal && entry.notifyState === "unseen") {
				entry.notifyState = "queued";
				pendingCompletionQueue.push({
					epoch: workflowEpoch,
					baseUrl: state.baseUrl,
					sessionId: state.sessionId,
					workflowId: wid,
					status
				});
				drainCompletionQueueIfIdle();
			}
		}

		async function pollWorkflowsOnce() {
			if (workflowPollInFlight) return;
			if (workflowsCapability !== "supported") return;
			if (!state.sessionId || !state.baseUrl) return;
			if (document.visibilityState !== "visible") return;
			workflowPollInFlight = true;
			const epoch = workflowEpoch;
			const baseUrl = state.baseUrl;
			const sessionId = state.sessionId;
			try {
				const headers = { "x-ms-session-id": sessionId };
				const resp = await fetch(`${baseUrl}${getApiBasePath()}/workflows${buildAuthQuery()}`, { headers });
				// Discard stale responses from a prior baseUrl/settings.
				if (epoch !== workflowEpoch) return;
				// 404 / 405 / 501 → endpoint genuinely not present. Stop forever.
				if (resp.status === 404 || resp.status === 405 || resp.status === 501) {
					markWorkflowsUnsupported();
					return;
				}
				if (!resp.ok) {
					workflowPollFailureCount += 1;
					if (workflowPollFailureCount === WORKFLOW_POLL_FAILURE_WARN_AT) {
						console.warn(`workflow polling: ${workflowPollFailureCount} consecutive non-OK responses (last status ${resp.status})`);
					}
					return;
				}
				workflowPollFailureCount = 0;
				const body = await resp.json();
				if (epoch !== workflowEpoch) return;
				const workflows = Array.isArray(body?.workflows) ? body.workflows : [];
				for (const wf of workflows) {
					upsertWorkflowCard(wf);
				}
			} catch (err) {
				if (epoch !== workflowEpoch) return;
				workflowPollFailureCount += 1;
				if (workflowPollFailureCount === WORKFLOW_POLL_FAILURE_WARN_AT) {
					console.warn(`workflow polling: ${workflowPollFailureCount} consecutive failures`, err);
				}
			} finally {
				workflowPollInFlight = false;
			}
		}

		function startWorkflowPolling() {
			// Hard gates: don't run a useless timer for non-workflow apps,
			// don't run before capability is confirmed, don't run without a
			// session, and don't run on a hidden tab.
			if (workflowsCapability !== "supported") return;
			if (!state.sessionId) return;
			if (workflowPollTimer !== null) return;
			if (document.visibilityState !== "visible") return;
			pollWorkflowsOnce();
			workflowPollTimer = setInterval(pollWorkflowsOnce, WORKFLOW_POLL_INTERVAL_MS);
		}

		function stopWorkflowPolling() {
			if (workflowPollTimer !== null) {
				clearInterval(workflowPollTimer);
				workflowPollTimer = null;
			}
		}

		function resetWorkflowCards() {
			// Remove DOM nodes alongside the map entries; a bare clear()
			// would leave stale workflow cards visible after a session
			// reset / base-URL change.
			for (const entry of workflowCards.values()) {
				if (entry.wrap && entry.wrap.parentNode) {
					entry.wrap.parentNode.removeChild(entry.wrap);
				}
			}
			workflowCards.clear();
			// Drop any queued auto-notifications. If a notification was
			// in-flight, the drain function's epoch/identity guards
			// already prevent it from mutating the new session's state.
			pendingCompletionQueue.length = 0;
			completionDrainInFlight = false;
		}

		// --- Auto-notification: drain & send ---
		// When a workflow we're tracking transitions to a terminal state,
		// `upsertWorkflowCard` enqueues a notification record.
		// `drainCompletionQueueIfIdle` waits for the chat to be idle
		// (no in-flight user turn or earlier auto-notification turn) and
		// then synthesizes a `<workflow-notification>` user turn against
		// the current agent chatstream endpoint, batching all currently-queued completions
		// for the active session into one prompt. Identity (epoch,
		// baseUrl, sessionId) is checked at drain time so a queued item
		// from a previous session/app is dropped silently — never sent.

		function dropStaleQueueEntries() {
			for (let i = pendingCompletionQueue.length - 1; i >= 0; i--) {
				const it = pendingCompletionQueue[i];
				if (
					it.epoch !== workflowEpoch ||
					it.baseUrl !== state.baseUrl ||
					it.sessionId !== state.sessionId
				) {
					pendingCompletionQueue.splice(i, 1);
				}
			}
		}

		function drainCompletionQueueIfIdle() {
			if (completionDrainInFlight) return;
			if (state.loading) return;
			if (!state.sessionId || !state.baseUrl) return;
			if (workflowsCapability !== "supported") return;
			dropStaleQueueEntries();
			if (pendingCompletionQueue.length === 0) return;

			// Batch all currently-queued items into one synthetic turn.
			const batch = pendingCompletionQueue.splice(0, pendingCompletionQueue.length);
			for (const it of batch) {
				const entry = workflowCards.get(it.workflowId);
				if (entry) entry.notifyState = "inflight";
			}
			completionDrainInFlight = true;
			sendCompletionNotification(batch).finally(() => {
				completionDrainInFlight = false;
				// If more landed during the turn, drain them too.
				drainCompletionQueueIfIdle();
			});
		}

		function buildCompletionNotificationPrompt(batch) {
			// Informational, not instructional. The system-prompt addendum
			// owns the contract (summary-only, race handling, etc.). Per
			// turn we just hand the model the data — matching the claurst
			// project's `<task-notification>` shape
			// (https://github.com/Kuberwastaken/claurst) — and one short
			// reminder of how to fetch the result.
			const envelopes = batch.map(it => (
				"<workflow-notification>\n" +
				`  <workflow-id>${escapeXml(it.workflowId)}</workflow-id>\n` +
				`  <status>${escapeXml(it.status)}</status>\n` +
				`  <summary>Workflow ${escapeXml(it.workflowId)} finished with status ${escapeXml(it.status)}.</summary>\n` +
				"</workflow-notification>"
			));
			const reminder = batch.length === 1
				? "Call `get_workflow_status` to retrieve the final result."
				: "Call `get_workflow_status` for each `<workflow-id>` to retrieve the final result(s).";
			return envelopes.join("\n") + "\n\n" + reminder;
		}

		function escapeXml(value) {
			return String(value)
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;");
		}

		function renderAutoNotificationBubble(batch, rawPrompt) {
			const wrap = document.createElement("div");
			wrap.className = "bubble-wrap auto";
			const bubble = document.createElement("div");
			bubble.className = "bubble auto";
			const summary = batch.length === 1
				? `⚙ Workflow <code>${escapeHtml(truncateId(batch[0].workflowId))}</code> finished (${escapeHtml(batch[0].status)}) — notifying the assistant`
				: `⚙ ${batch.length} workflows finished — notifying the assistant`;
			// Single-line layout: body text + inline disclosure trigger.
			// The <pre> only appears (as a block) when the user opens it.
			bubble.innerHTML = `<span class="auto-notification-body">${summary}</span><details class="auto-notification-raw"><summary>show prompt</summary><pre>${escapeHtml(rawPrompt)}</pre></details>`;
			wrap.appendChild(bubble);
			chatEl.appendChild(wrap);
			scrollChatToBottom();
			return { wrap, bubble };
		}

		async function sendCompletionNotification(batch) {
			// Capture identity at send time. If anything moves under us
			// while the synthetic turn streams, the response handlers
			// will still complete normally — we just won't persist into
			// stale namespaces (notifiedWorkflowsStorageKey() reads the
			// current state, so a session-flip mid-flight would write
			// to the new namespace; that's tolerable since the only
			// observable effect is one extra notification on the
			// previous app, which we already dropped from the DOM).
			const prompt = buildCompletionNotificationPrompt(batch);
			renderAutoNotificationBubble(batch, prompt);

			setLoading(true, { showWaitingBubble: false });
			const streamingBubble = renderBubble("copilot", "", "Copilot • streaming...");
			const liveDetails = { responseIntermediate: [], toolCalls: [] };

			try {
				let currentToolCount = 0;
				let currentIntermediateCount = 0;
				const updateStreamingMeta = () => {
					const segments = ["Copilot", "streaming..."];
					if (currentToolCount > 0) {
						segments.push(`${currentToolCount} tool call${currentToolCount === 1 ? "" : "s"}`);
					}
					if (currentIntermediateCount > 0) {
						segments.push(`${currentIntermediateCount} intermediate${currentIntermediateCount === 1 ? "" : "s"}`);
					}
					setBubbleMeta(streamingBubble.bubble, segments.join(" • "));
				};

				const result = await sendMessage(prompt, {
					onDelta: (text) => {
						setBubbleText(streamingBubble.bubble, "copilot", text);
						scrollChatToBottom();
					},
					onToolCount: (count) => {
						currentToolCount = count;
						updateStreamingMeta();
					},
					onIntermediate: (count, responses) => {
						currentIntermediateCount = count;
						updateStreamingMeta();
						setBubbleIntermediates(streamingBubble.bubble, responses);
						scrollChatToBottom();
					},
					onDetailsUpdate: (snap) => {
						const normalizedLive = normalizeDetails(snap);
						liveDetails.responseIntermediate = normalizedLive.responseIntermediate;
						liveDetails.toolCalls = normalizedLive.toolCalls;
						attachBubbleDetails(streamingBubble.bubble, liveDetails);
						refreshOpenDetails(liveDetails);
					}
				});
				const copilotMeta = hasDetails(result.details)
					? "Copilot • click bubble for details"
					: "Copilot";
				setBubbleText(streamingBubble.bubble, "copilot", result.text);
				setBubbleIntermediates(streamingBubble.bubble, []);
				setBubbleMeta(streamingBubble.bubble, copilotMeta);
				liveDetails.responseIntermediate = result.details.responseIntermediate;
				liveDetails.toolCalls = result.details.toolCalls;
				attachBubbleDetails(streamingBubble.bubble, liveDetails);
				refreshOpenDetails(liveDetails);

				// Persist + mark each batch item as 'sent'. Persist is
				// keyed on the *current* {baseUrl, sessionId}; if those
				// changed mid-stream the write either fails (no key) or
				// writes into the new namespace, which is fine — we
				// already dropped the cards from the DOM.
				for (const it of batch) {
					const entry = workflowCards.get(it.workflowId);
					if (entry) entry.notifyState = "sent";
					persistNotifiedWorkflowId(it.workflowId);
				}
				if (result.sessionId) {
					setStatus(`Connected • Session ${result.sessionId}`);
				} else {
					setStatus("Connected");
				}
			} catch (error) {
				setBubbleText(streamingBubble.bubble, "copilot", `Auto-notification failed. ${error.message}`);
				setBubbleIntermediates(streamingBubble.bubble, []);
				setBubbleMeta(streamingBubble.bubble, "Copilot");
				attachBubbleDetails(streamingBubble.bubble, null);
				for (const it of batch) {
					const entry = workflowCards.get(it.workflowId);
					if (entry) entry.notifyState = "failed";
				}
				setStatus(error.message, true);
			} finally {
				setLoading(false);
				promptInputEl.focus();
			}
		}

		// One-shot capability probe: tries the workflows endpoint to learn
		// whether the server registered the route. Status code distinguishes
		// "endpoint exists" (200) from "feature off" (404/405/501). We
		// deliberately don't drain the response body here — we just settle
		// the capability flag and let the immediately-following call to
		// pollWorkflowsOnce() do the drain using whichever session id is
		// authoritative by then. That removes a race where a server-fresh
		// session arrives during the probe and the probe's response body
		// would otherwise paint cards for the now-discarded candidate.
		// Single-flight via workflowProbeInFlight.
		async function probeWorkflowsCapability() {
			if (!state.baseUrl) return;
			if (workflowsCapability !== "unknown") return;
			if (workflowProbeInFlight) return;
			workflowProbeInFlight = true;
			const epoch = workflowEpoch;
			const baseUrl = state.baseUrl;
			// Send the candidate header so the server can short-circuit
			// auth checks identically to a real poll. The body is ignored.
			const probeSessionId = state.sessionId || restoredSessionIdCandidate;
			try {
				const headers = probeSessionId ? { "x-ms-session-id": probeSessionId } : {};
				const resp = await fetch(`${baseUrl}${getApiBasePath()}/workflows${buildAuthQuery()}`, { headers });
				if (epoch !== workflowEpoch) return;
				if (resp.status === 404 || resp.status === 405 || resp.status === 501) {
					markWorkflowsUnsupported();
					return;
				}
				if (!resp.ok) {
					// Ambiguous (auth, 500, etc.) — leave capability "unknown"
					// so the next user action can re-trigger probing.
					return;
				}
				const hadCandidateButNoServerSession =
					!state.sessionId && Boolean(restoredSessionIdCandidate);
				markWorkflowsSupported();
				if (hadCandidateButNoServerSession && state.sessionId && !sessionWasFromServer) {
					setStatus("Reconnected to existing session.");
					if (restoredGreetingContent) {
						restoredGreetingContent.textContent =
							"Welcome back — reconnected to your previous session. Active workflows will appear below within a few seconds.";
					}
				}
			} catch (_err) {
				// Network error during probe — leave capability "unknown" so
				// the next user action can re-trigger it.
			} finally {
				workflowProbeInFlight = false;
			}
		}

		document.addEventListener("visibilitychange", () => {
			if (document.visibilityState === "visible") {
				startWorkflowPolling();
			} else {
				stopWorkflowPolling();
			}
		});

		function escapeHtml(value) {
			return value
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#039;");
		}

		function renderInlineMarkdown(text) {
			let content = text;
			content = content.replace(/`([^`]+)`/g, '<code class="md-inline-code">$1</code>');
			content = content.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
			content = content.replace(/\*([^*]+)\*/g, "<em>$1</em>");
			content = content.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
			return content;
		}

		function renderMarkdownBasic(markdown) {
			const safeMarkdown = escapeHtml(String(markdown || "")).replace(/\r\n?/g, "\n");
			const codeBlocks = [];

			const withPlaceholders = safeMarkdown.replace(/```[^\n]*\n?([\s\S]*?)```/g, (_match, code) => {
				const token = `@@CODEBLOCK_${codeBlocks.length}@@`;
				codeBlocks.push(`<pre class="md-pre"><code>${code.trimEnd()}</code></pre>`);
				return token;
			});

			const lines = withPlaceholders.split("\n");
			const html = [];
			let inUnorderedList = false;
			let inOrderedList = false;

			const splitTableRow = (line) => {
				const normalized = line.trim().replace(/^\|/, "").replace(/\|$/, "");
				if (!normalized.includes("|")) return null;
				return normalized.split("|").map((cell) => cell.trim());
			};

			const isTableSeparator = (line) => {
				const cells = splitTableRow(line);
				if (!cells || cells.length < 2) return false;
				return cells.every((cell) => /^:?-{3,}:?$/.test(cell));
			};

			const renderTable = (headerCells, bodyRows) => {
				const thead = `<thead><tr>${headerCells.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join("")}</tr></thead>`;
				const tbodyRows = bodyRows
					.map((row) => `<tr>${row.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>`)
					.join("");
				return `<div class="md-table-wrap"><table class="md-table">${thead}<tbody>${tbodyRows}</tbody></table></div>`;
			};

			const closeLists = () => {
				if (inUnorderedList) {
					html.push("</ul>");
					inUnorderedList = false;
				}
				if (inOrderedList) {
					html.push("</ol>");
					inOrderedList = false;
				}
			};

			for (let i = 0; i < lines.length; i += 1) {
				const rawLine = lines[i];
				const line = rawLine.trim();

				if (!line) {
					closeLists();
					continue;
				}

				if (/^@@CODEBLOCK_\d+@@$/.test(line)) {
					closeLists();
					html.push(line);
					continue;
				}

				const headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
				if (headingMatch) {
					closeLists();
					const level = headingMatch[1].length;
					html.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
					continue;
				}

				const nextLine = (lines[i + 1] || "").trim();
				const headerCells = splitTableRow(line);
				if (headerCells && isTableSeparator(nextLine) && headerCells.length >= 2) {
					closeLists();
					const bodyRows = [];
					i += 2;
					for (; i < lines.length; i += 1) {
						const rowLine = lines[i].trim();
						if (!rowLine) {
							break;
						}
						const rowCells = splitTableRow(rowLine);
						if (!rowCells) {
							i -= 1;
							break;
						}
						bodyRows.push(rowCells);
					}

					html.push(renderTable(headerCells, bodyRows));
					continue;
				}

				const unorderedMatch = line.match(/^[-*]\s+(.+)$/);
				if (unorderedMatch) {
					if (inOrderedList) {
						html.push("</ol>");
						inOrderedList = false;
					}
					if (!inUnorderedList) {
						html.push("<ul>");
						inUnorderedList = true;
					}
					html.push(`<li>${renderInlineMarkdown(unorderedMatch[1])}</li>`);
					continue;
				}

				const orderedMatch = line.match(/^\d+\.\s+(.+)$/);
				if (orderedMatch) {
					if (inUnorderedList) {
						html.push("</ul>");
						inUnorderedList = false;
					}
					if (!inOrderedList) {
						html.push("<ol>");
						inOrderedList = true;
					}
					html.push(`<li>${renderInlineMarkdown(orderedMatch[1])}</li>`);
					continue;
				}

				closeLists();
				html.push(`<p>${renderInlineMarkdown(line)}</p>`);
			}

			closeLists();

			const rendered = html.join("").replace(/@@CODEBLOCK_(\d+)@@/g, (_match, index) => {
				return codeBlocks[Number(index)] || "";
			});

			return rendered || "<p></p>";
		}

			// IMPORTANT: do NOT restore state.sessionId here. We can't read
			// the right namespaced key until loadSettingsFromHash() has had
			// a chance to override baseUrl, and we must not let a restored
			// id ride along on chat requests for an app whose workflow
			// support hasn't been confirmed yet (would break the "non-
			// workflow apps unchanged" invariant). The candidate is loaded
			// later via loadRestoredSessionCandidate().
		}

			// session continuity for plain (non-workflow) chat apps.

				if (state.sessionId) {
					sessionStorage.setItem(sessionStorageKeyForSessionId(), state.sessionId);
				} else {

			const hashBaseUrl = (params.get("baseUrl") || "").trim().replace(/\/+$/, "");
			const hashKey = (params.get("key") || "").trim();

			if (!hashBaseUrl && !hashKey) {
				return false;
			}

			if (hashBaseUrl) {
				state.baseUrl = hashBaseUrl;
				localStorage.setItem(STORAGE_KEYS.baseUrl, state.baseUrl);
			}

			if (hashKey) {
				state.key = hashKey;
				localStorage.setItem(STORAGE_KEYS.key, state.key);

			if (!state.baseUrl) {
				setStatus("Base URL is required.", true);
				baseUrlInputEl.focus();
				return false;
			}

			if (requiresFunctionKey(state.baseUrl) && !state.key) {
				setStatus("Key is required for non-localhost URLs.", true);
				keyInputEl.focus();
				return false;
			}

			localStorage.setItem(STORAGE_KEYS.baseUrl, state.baseUrl);
			localStorage.setItem(STORAGE_KEYS.key, state.key);

			// all session/workflow state — the previous session id is
			// scoped to the previous app and would be misleading at best,
			// silently authenticated against the new app at worst. The
			// epoch bump invalidates any in-flight probe/poll responses
			// that haven't resolved yet so they can't mutate new-app state.
			if (previousBaseUrl && previousBaseUrl !== state.baseUrl) {

		function getMessageFromBody(body) {
			if (!body) return "(No response body)";
			if (typeof body === "string") return body;

			const candidates = [
				body.response,
				body.answer,
				body.message,
				body.text,
				body.output,
				body.content,
				body.result,
				body?.data?.response,
				body?.data?.message,
				body?.choices?.[0]?.message?.content
			];

			for (const value of candidates) {
				if (typeof value === "string" && value.trim()) {
					return value;
				}
			}

			return JSON.stringify(body, null, 2);
		}

		async function sendMessage(prompt, callbacks = {}) {
			const authQuery = state.key ? `?code=${encodeURIComponent(state.key)}` : "";
			const endpoint = `${state.baseUrl}${getApiBasePath()}/chatstream${authQuery}`;
			const headers = {
				"Content-Type": "application/json",
				"Accept": "text/event-stream"
			};

			if (state.sessionId) {
				headers["x-ms-session-id"] = state.sessionId;
			}

			const response = await fetch(endpoint, {
				method: "POST",
				headers,
				body: JSON.stringify({ prompt })
			});

			if (!response.ok) {
				const raw = await response.text();
				let body;
				try {
					body = raw ? JSON.parse(raw) : null;
				} catch {
					body = raw;
				}

				throw new Error(`HTTP ${response.status}: ${message}`);

			if (!response.body) {

			}

			const reader = response.body.getReader();
			const decoder = new TextDecoder();
			let buffer = "";
			let streamText = "";
			let finalMessage = "";
			let doneReceived = false;
			const intermediateResponses = [];
			const toolCalls = [];
			const seenToolStartKeys = new Set();
			let pendingIntermediateLineBreak = false;
			let lastStreamEventKey = null;

			const getStreamEventKey = (event) => {
				const type = event?.type || "";
				if (!type) return null;

				if (event?.event_id) {
					return `${type}|event:${event.event_id}`;
				}

				if (event?.tool_call_id) {
					return `${type}|tool:${event.tool_call_id}`;
				}

				if (type === "delta" || type === "message" || type === "intermediate") {
					return `${type}|content:${String(event?.content || "")}`;
				}

				if (type === "session") {
					return `${type}|session:${String(event?.session_id || "")}`;
				}

				if (type === "done" || type === "error") {
					return `${type}|${String(event?.content || "")}`;
				}

				return `${type}|${JSON.stringify(event)}`;
			};

			const handleEvent = (event) => {
				const type = event?.type;

				if (type === "session" && typeof event.session_id === "string" && event.session_id.trim()) {
					state.sessionId = event.session_id;
					sessionWasFromServer = true;
					// Drop any restore-candidate now that we have a real
					// server session — they may not match.
					restoredSessionIdCandidate = null;
					persistSessionId();
					// If we already know workflows are supported, start
					// polling now. If still "unknown", trigger the probe
					// instead — never blindly fire polling against an
					// endpoint we haven't confirmed exists. If "unsupported",
					// neither call has any effect.
					if (workflowsCapability === "supported") {
						startWorkflowPolling();
					} else if (workflowsCapability === "unknown") {
						probeWorkflowsCapability();
					}
					return;
				}

				if (type === "delta" && typeof event.content === "string") {
					streamText += event.content;
					if (typeof callbacks.onDelta === "function") {
						callbacks.onDelta(streamText);
					}
					return;
				}

				if (type === "message" && typeof event.content === "string") {
					finalMessage = event.content;
					if (!event.content) {
						pendingIntermediateLineBreak = true;
					}
					return;
				}

				if (type === "intermediate" && typeof event.content === "string") {
					const content = event.content;
					if (content.length > 0) {
						if (pendingIntermediateLineBreak && intermediateResponses.length > 0) {
							intermediateResponses.push("\n");
						}
						pendingIntermediateLineBreak = false;
						intermediateResponses.push(content);
						if (typeof callbacks.onIntermediate === "function") {
							callbacks.onIntermediate(intermediateResponses.length, intermediateResponses);
						}
						if (typeof callbacks.onDetailsUpdate === "function") {
							callbacks.onDetailsUpdate({
								responseIntermediate: intermediateResponses,
								toolCalls
							});
						}
					}
					return;
				}

				if (type === "tool_start") {
					const toolStartKey = [
						event?.event_id || "",
						event?.tool_call_id || "",
						event?.tool_name || ""
					].join("|");
					if (seenToolStartKeys.has(toolStartKey)) {
						return;
					}
					seenToolStartKeys.add(toolStartKey);

					toolCalls.push({
						event_id: event?.event_id || null,
						tool_name: event?.tool_name || "(unknown tool)",
						tool_call_id: event?.tool_call_id || null,
						parent_tool_call_id: event?.parent_tool_call_id || null,
						arguments: event?.arguments || {},
						timestamp: event?.timestamp || new Date().toISOString()
					});
					if (typeof callbacks.onToolCount === "function") {
						callbacks.onToolCount(toolCalls.length);
					}
					if (typeof callbacks.onDetailsUpdate === "function") {
						callbacks.onDetailsUpdate({
							responseIntermediate: intermediateResponses,
							toolCalls
						});
					}
					return;
				}

				if (type === "tool_end") {
					const toolCallId = event?.tool_call_id || null;
					if (toolCallId) {
						const existing = toolCalls.find((item) => item?.tool_call_id === toolCallId);
						if (existing) {
							existing.result = event?.result ?? null;
							existing.timestamp = event?.timestamp || existing.timestamp;
						}
					}
					if (typeof callbacks.onDetailsUpdate === "function") {
						callbacks.onDetailsUpdate({
							responseIntermediate: intermediateResponses,
							toolCalls
						});
					}
					return;
				}

				if (type === "error") {
					throw new Error(typeof event?.content === "string" && event.content.trim() ? event.content : "Streaming request failed.");
				}

				if (type === "done") {
					doneReceived = true;
				}
			};

			while (!doneReceived) {
				const { value, done } = await reader.read();
				if (done) break;

				buffer += decoder.decode(value, { stream: true });
				let boundary = buffer.indexOf("\n\n");
				while (boundary !== -1) {
					const block = buffer.slice(0, boundary);
					buffer = buffer.slice(boundary + 2);

					const lines = block.split("\n");

						if (!line.startsWith("data:")) continue;
						const payload = line.slice(5).trim();
						if (!payload) continue;

						let event;
						try {
							event = JSON.parse(payload);
						} catch {
							continue;
						}

						const eventKey = getStreamEventKey(event);
						if (eventKey && eventKey === lastStreamEventKey) {
							continue;
						}
						lastStreamEventKey = eventKey;

						handleEvent(event);
						if (doneReceived) break;
					}

					if (doneReceived) break;
					boundary = buffer.indexOf("\n\n");
				}
			}

			const finalTrimmed = typeof finalMessage === "string" ? finalMessage.trim() : "";
			const filteredIntermediateResponses = intermediateResponses.filter((item) => {
				if (typeof item !== "string") return false;
				const value = item.trim();
				if (!value) return false;
				if (finalTrimmed && value === finalTrimmed) return false;
				return true;
			});

			const details = normalizeDetails({
				responseIntermediate: filteredIntermediateResponses,
				toolCalls
			});

			return {
				text: finalMessage || streamText || "(No response body)",
				sessionId: state.sessionId,
				details
			};
		}

		composerEl.addEventListener("submit", async (event) => {
			event.preventDefault();

			if (!state.baseUrl || (requiresFunctionKey(state.baseUrl) && !state.key)) {
				showSettings(true);
				setStatus("Set your base URL and key before chatting.", true);
				return;
			}

			const prompt = promptInputEl.value.trim();
			if (!prompt || state.loading) return;

			renderBubble("you", prompt, "You");
			promptInputEl.value = "";
			setLoading(true, { showWaitingBubble: false });
			const streamingBubble = renderBubble("assistant", "", "Assistant • streaming...");
			const liveDetails = {
				responseIntermediate: [],
				toolCalls: []
			};

			try {
				let currentToolCount = 0;
				let currentIntermediateCount = 0;
				const updateStreamingMeta = () => {
					const segments = ["assistant", "streaming..."];
					if (currentToolCount > 0) {
						segments.push(`${currentToolCount} tool call${currentToolCount === 1 ? "" : "s"}`);
					}
					if (currentIntermediateCount > 0) {
						segments.push(`${currentIntermediateCount} intermediate${currentIntermediateCount === 1 ? "" : "s"}`);
					}
					setBubbleMeta(streamingBubble.bubble, segments.join(" • "));
				};

				const result = await sendMessage(prompt, {
					onDelta: (text) => {
						setBubbleText(streamingBubble.bubble, "assistant", text);
						scrollChatToBottom();
					},
					onToolCount: (count) => {
						currentToolCount = count;
						updateStreamingMeta();
					},
					onIntermediate: (count, responses) => {
						currentIntermediateCount = count;
						updateStreamingMeta();
						setBubbleIntermediates(streamingBubble.bubble, responses);
						scrollChatToBottom();
					},
					onDetailsUpdate: (detailsSnapshot) => {
						const normalizedLive = normalizeDetails(detailsSnapshot);
						liveDetails.responseIntermediate = normalizedLive.responseIntermediate;
						liveDetails.toolCalls = normalizedLive.toolCalls;
						attachBubbleDetails(streamingBubble.bubble, liveDetails);
						refreshOpenDetails(liveDetails);
					}
				});
				const assistantMeta = hasDetails(result.details)
					? "Agent • click bubble for details"
					: "assistant";
				setBubbleText(streamingBubble.bubble, "assistant", result.text);
				setBubbleIntermediates(streamingBubble.bubble, []);
				setBubbleMeta(streamingBubble.bubble, assistantMeta);
				liveDetails.responseIntermediate = result.details.responseIntermediate;
				liveDetails.toolCalls = result.details.toolCalls;
				attachBubbleDetails(streamingBubble.bubble, liveDetails);
				refreshOpenDetails(liveDetails);
				if (result.sessionId) {
					setStatus(`Connected • Session ${result.sessionId}`);
				} else {
					setStatus("Connected");
				}
			} catch (error) {
				setBubbleText(streamingBubble.bubble, "assistant", `Request failed. ${error.message}`);
				setBubbleIntermediates(streamingBubble.bubble, []);
				setBubbleMeta(streamingBubble.bubble, "assistant");
				attachBubbleDetails(streamingBubble.bubble, null);
				setStatus(error.message, true);
			} finally {
				setLoading(false);
				promptInputEl.focus();
				// If a workflow completed while the user's turn was
				// streaming, drain the queue now that we're idle.
				drainCompletionQueueIfIdle();
			}
		});

		promptInputEl.addEventListener("keydown", (event) => {
			if (event.key === "Enter" && !event.shiftKey) {
				event.preventDefault();
				composerEl.requestSubmit();
			}
		});

		newSessionBtnEl.addEventListener("click", () => {
			state.sessionId = null;
			sessionWasFromServer = false;
			restoredSessionIdCandidate = null;
			// Always clear stored session id, regardless of capability.
			try { sessionStorage.removeItem(sessionStorageKeyForSessionId()); } catch (_e) {}
			stopWorkflowPolling();
			resetWorkflowCards();
			chatEl.innerHTML = "";
			hideDetails();
			setStatus("Started a new session. Next message will not send a session id.");
			promptInputEl.focus();
		});

		settingsBtnEl.addEventListener("click", () => {
			showSettings(false);
			setStatus("Editing connection settings.");
		});

		saveSettingsBtnEl.addEventListener("click", () => {
			saveSettings();
		});

		cancelSettingsBtnEl.addEventListener("click", () => {
			hideSettings();
			setStatus("Settings unchanged.");
		});

		settingsBackdropEl.addEventListener("click", (event) => {
			if (event.target === settingsBackdropEl && cancelSettingsBtnEl.style.display !== "none") {
				hideSettings();
			}
		});

		closeDetailsBtnEl.addEventListener("click", () => {
			hideDetails();
		});

		detailsBackdropEl.addEventListener("click", (event) => {
			if (event.target === detailsBackdropEl) {
				hideDetails();
			}
		});

		document.addEventListener("keydown", (event) => {
			if (event.key === "Escape") {
				hideDetails();
			}
		});

		loadSettings();
		loadSettingsFromHash();
		// Read the per-baseUrl namespaced session candidate AFTER both
		// settings sources have had their say.
		loadRestoredSessionCandidate();
		if (!state.baseUrl || (requiresFunctionKey(state.baseUrl) && !state.key)) {
			state.baseUrl = state.baseUrl || defaultBaseUrl;
			showSettings(true);
			setStatus("Enter your base URL and key to begin.");
		} else {
			// Always show the baseline greeting. probeWorkflowsCapability
			// upgrades it in place if (a) workflows are supported AND
			// (b) we had a session candidate to reconnect with.
			setStatus("Ready.");
			const greeting = renderBubble("copilot", "Hi! Send a message to start chatting.", "Copilot");
			restoredGreetingContent = greeting?.contentEl || null;
			// Probe asynchronously; this is the gate on persistence + polling.
			probeWorkflowsCapability();
			promptInputEl.focus();
		}
	</script>
</body>
</html>
